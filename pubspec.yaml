name: rede_canais_browser
description: A lightweight browser for Rede Canais website.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # WebView plugin with advanced features
  flutter_inappwebview: ^6.0.0
  # Connectivity checking
  connectivity_plus: ^5.0.0
  # State management
  flutter_riverpod: ^2.4.0
  # Path provider for downloads
  path_provider: ^2.1.0
  # Permission handler
  permission_handler: ^11.0.0
  # Device info
  device_info_plus: ^9.0.0
  # URL launcher for external links
  url_launcher: ^6.2.0
  # Keep screen on during video playback
  wakelock_plus: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

  # App icon configuration
  # Icons will be generated via flutter_launcher_icons
